# gitleaks config for create-arca — the third pillar of the scrub defense.
#
# scrub.py + the UUID grep in ci.yml cover identity markers and the org-id.
# gitleaks covers GENERIC secret material (private keys, cloud/API tokens) that
# could theoretically slip into the harness and survive into template/.
#
# We start from gitleaks' maintained default ruleset. The published template
# must contain zero REAL credentials, so any hit outside the allowlist below is
# a bug. The allowlist exists because the harness is, by design, full of secret
# *shapes* that are not secrets:
#
#   1. The secret-detector itself. The harness ships hooks whose whole job is to
#      catch leaked credentials, so they literally contain the regex catalog
#      (PEM private-key headers, AWS AKIA prefixes, Anthropic sk-ant tokens).
#      gitleaks reads those patterns as live findings; they are the detector's
#      own source code, not leaked material.
#   2. Documentation placeholders. Security/pentest/API skills and commands carry
#      teaching examples — `Authorization: Bearer ATTACKER_TOKEN`, the RFC 6455
#      WebSocket handshake nonce `dGhlIHNhbXBsZSBub25jZQ==`, base64 `password123`
#      (`cGFzc3dvcmQxMjM=`), and the Stripe Idempotency-Key example UUID. None are
#      real material; they are required for the docs to be legible.
#
# Each path below was confirmed by hand against the CI finding before being
# added. The allowlist is path-scoped (regex), never global, so a real key
# dropped into any other file still fails CI.

title = "create-arca gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Harness detection-pattern catalogs and documentation example payloads — confirmed non-secret."
paths = [
    # --- Secret-detector source: these files ARE the credential regex catalog ---
    '''template/hooks/lib/secret-patterns\.sh''',
    '''template/hooks/detect-secrets\.sh''',
    '''template/hooks/lib/secrets-mask\.sh''',
    '''template/hooks/post-tool-secrets-mask\.sh''',
    '''template/hooks/engram-prompt-capture\.sh''',

    # --- Documentation placeholders (teaching examples, not real credentials) ---
    '''template/commands/hunt\.md''',
    '''template/agents/api-designer\.md''',

    # --- Security/offensive skills carrying example payloads & PoC snippets ---
    '''template/skills/security-arsenal/.*''',
    '''template/skills/bug-bounty/.*''',
    '''template/skills/pentest-.*''',
    '''template/skills/transilience-.*''',

    # --- Kubernetes skill: base64 `password123` secret-manifest example ---
    '''template/skills/kubernetes/.*''',
]
